name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Nix Flake Check
        run: nix flake check --print-build-logs --system aarch64-darwin

      - name: Build darwin binary
        run: nix build .#darwin-vz-nix -o result-darwin

      - name: Push to Cachix
        run: cachix push takeokunn-darwin-vz-nix result-darwin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
